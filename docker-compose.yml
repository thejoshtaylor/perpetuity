services:

  db:
    image: postgres:18
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}

  adminer:
    image: adminer
    restart: always
    networks:
      - default
    depends_on:
      - db
    environment:
      - ADMINER_DESIGN=pepa-linha-dark

  redis:
    image: redis:7-alpine
    restart: always
    # Internal compose network only — never publish a host port. Password
    # is the shared secret pattern (M002 CONTEXT: "Redis password: internal-
    # network only; never exposed externally").
    networks:
      - default
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD?Variable not set}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # S02/T03: prepare /var/lib/perpetuity/workspaces as a shared mountpoint
  # on the host (linuxkit VM) BEFORE the orchestrator boots. This enables
  # bind-mount propagation from orchestrator to host so that loopback-ext4
  # mounts performed inside the orchestrator are visible to dockerd when
  # it creates workspace containers (which bind-mount the same path).
  # Without this the workspace containers would see the underlying host
  # directory, not the ext4 mount, and the kernel-enforced size cap would
  # not bite. Runs once per compose up; on Linux hosts where /var/lib is
  # already a shared mount this is a no-op (mount --make-shared is
  # idempotent).
  workspace-mount-init:
    image: alpine:3
    pid: host
    privileged: true
    restart: "no"
    command: >
      nsenter -t 1 -m -- sh -c "
      mkdir -p /var/lib/perpetuity/workspaces /var/lib/perpetuity/vols &&
      ( mountpoint -q /var/lib/perpetuity/workspaces || mount --bind /var/lib/perpetuity/workspaces /var/lib/perpetuity/workspaces ) &&
      mount --make-shared /var/lib/perpetuity/workspaces &&
      echo workspace_mount_init_ok
      "

  orchestrator:
    image: '${DOCKER_IMAGE_ORCHESTRATOR-orchestrator}:${TAG-latest}'
    restart: always
    networks:
      - default
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      workspace-mount-init:
        condition: service_completed_successfully
    # D005: orchestrator is the ONLY service that mounts the Docker socket.
    # NOTE: orchestrator does NOT depend on prestart (the backend container
    # that applies migrations) because the existing dev .env pins
    # POSTGRES_PORT=55432 which the prestart container respects but the
    # orchestrator (which uses db:5432 internally) does not. MEM021
    # captures this drift. Until that is reconciled, the workspace_volume
    # table must be migrated manually before the orchestrator's first
    # /v1/sessions request — the orchestrator boots fine without it and
    # surfaces 503 from POST /v1/sessions until the table exists.
    # T03: also bind-mount the workspace root 1:1 so the orchestrator can
    # `mkdir -p /var/lib/perpetuity/workspaces/<u>/<t>/` and pass the same
    # host path to workspace containers as a bind-mount source. S02 swaps
    # this for loopback-ext4 volumes mounted at the same path.
    # S02/T03: also bind-mount /var/lib/perpetuity/vols (the .img store) so
    # per-volume loopback files survive orchestrator restarts.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # S02/T03: workspaces uses propagation=rshared so loopback-ext4 mounts
      # performed inside the orchestrator propagate back to the host's mount
      # namespace — without this, dockerd creates workspace containers
      # against the *underlying* host directory (not the ext4 mount), which
      # bypasses the kernel-enforced size cap.
      # PREREQUISITE: the host's /var/lib/perpetuity/workspaces must be a
      # shared mountpoint. See orchestrator's startup `_ensure_shared_mount`
      # which arranges this before lifespan continues.
      - type: bind
        source: /var/lib/perpetuity/workspaces
        target: /var/lib/perpetuity/workspaces
        bind:
          propagation: rshared
      - /var/lib/perpetuity/vols:/var/lib/perpetuity/vols
    # D014/MEM136: real loopback-ext4 mounts require `privileged: true` on
    # Docker Desktop / linuxkit. SYS_ADMIN + /dev/loop-control alone is not
    # enough because the per-loop device nodes (/dev/loopN) are not
    # auto-created without privileged mode. Privileged is bounded to the
    # orchestrator service only (the workspace containers stay unprivileged).
    privileged: true
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD?Variable not set}
      - ORCHESTRATOR_API_KEY=${ORCHESTRATOR_API_KEY?Variable not set}
      - ORCHESTRATOR_API_KEY_PREVIOUS=${ORCHESTRATOR_API_KEY_PREVIOUS-}
      # M004/S01: Fernet key for sensitive system_settings rows (GitHub
      # App private key, webhook secret). MUST stay stable across
      # restarts — rotating this without re-encrypting every sensitive
      # row breaks every subsequent decrypt and surfaces as 503
      # `system_settings_decrypt_failed`. Same value MUST be set on the
      # backend service (read from the root .env once).
      - SYSTEM_SETTINGS_ENCRYPTION_KEY=${SYSTEM_SETTINGS_ENCRYPTION_KEY?Variable not set}
      - WORKSPACE_IMAGE=${WORKSPACE_IMAGE-perpetuity/workspace:latest}
      # S02/T03: orchestrator owns the workspace_volume row lookup. Backend
      # owns the schema (s04 migration); the orchestrator only reads/inserts.
      - DATABASE_URL=postgresql://${POSTGRES_USER?Variable not set}:${POSTGRES_PASSWORD?Variable not set}@db:5432/${POSTGRES_DB?Variable not set}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  prestart:
    image: '${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}'
    build:
      context: .
      dockerfile: backend/Dockerfile
    networks:
      - default
    depends_on:
      db:
        condition: service_healthy
        restart: true
    command: bash scripts/prestart.sh
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN}
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD?Variable not set}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - SENTRY_DSN=${SENTRY_DSN}

  backend:
    image: '${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}'
    restart: always
    networks:
      - default
    depends_on:
      db:
        condition: service_healthy
        restart: true
      prestart:
        condition: service_completed_successfully
      orchestrator:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN}
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD?Variable not set}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - SENTRY_DSN=${SENTRY_DSN}
      - ORCHESTRATOR_BASE_URL=${ORCHESTRATOR_BASE_URL-http://orchestrator:8001}
      - ORCHESTRATOR_API_KEY=${ORCHESTRATOR_API_KEY?Variable not set}
      # M004/S01: Fernet key for sensitive system_settings rows. MUST
      # match the orchestrator's value (rotating without re-encrypting
      # every sensitive row breaks every read). See orchestrator service.
      - SYSTEM_SETTINGS_ENCRYPTION_KEY=${SYSTEM_SETTINGS_ENCRYPTION_KEY?Variable not set}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 10s
      timeout: 5s
      retries: 5

    build:
      context: .
      dockerfile: backend/Dockerfile

  # M005/S02/T04: Celery worker that drives `workflow_runs` from
  # pending → running → succeeded|failed. Same image as `backend` so the
  # source tree (app.workflows.tasks, app.workflows.executors.ai) is shared
  # without bundling. Reads the broker URL from REDIS_HOST/REDIS_PORT/
  # REDIS_PASSWORD just like the rate limiter and orchestrator. Per D005
  # this service does NOT mount the Docker socket — the executor talks to
  # the orchestrator over HTTP and the orchestrator owns docker.
  celery-worker:
    image: '${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}'
    restart: always
    networks:
      - default
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
      prestart:
        condition: service_completed_successfully
    command: celery -A app.workflows.tasks worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD?Variable not set}
      - ORCHESTRATOR_BASE_URL=${ORCHESTRATOR_BASE_URL-http://orchestrator:8001}
      - ORCHESTRATOR_API_KEY=${ORCHESTRATOR_API_KEY?Variable not set}
      # D016 two-key shared-secret discipline — same Fernet key as the
      # backend so `get_team_secret` decrypts what the API encrypted.
      - SYSTEM_SETTINGS_ENCRYPTION_KEY=${SYSTEM_SETTINGS_ENCRYPTION_KEY?Variable not set}
      - SENTRY_DSN=${SENTRY_DSN}

  frontend:
    image: '${DOCKER_IMAGE_FRONTEND?Variable not set}:${TAG-latest}'
    restart: always
    networks:
      - default
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=https://api.${DOMAIN?Variable not set}
        - NODE_ENV=production
volumes:
  app-db-data:
